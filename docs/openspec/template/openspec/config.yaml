schema: spec-driven

context:
  project:
    name: "PROJECT_NAME"
    description: "PROJECT_DESCRIPTION"
    language: "LANGUAGE"
    runtime: "RUNTIME"
    package_manager: "PACKAGE_MANAGER"

  tech_stack:
    language: "LANGUAGE VERSION"
    test_framework: "TEST_FRAMEWORK"
    web_framework: "WEB_FRAMEWORK"
    ui: "UI_FRAMEWORK"
    runtime: "RUNTIME"

  modules:
    MODULE_NAME:
      purpose: "MODULE_PURPOSE"
      scope: "MODULE_SCOPE"
      tests: "MODULE_TESTS_PATH"

  conventions:
    - ES Module syntax
    - Strict TypeScript
    - Async/await
    - Identifiers in English
    - Comments can be Chinese

  commands:
    install: "PACKAGE_MANAGER install"
    dev: "PACKAGE_MANAGER dev"
    build: "PACKAGE_MANAGER build"
    test: "PACKAGE_MANAGER test"
    test_unit: "PACKAGE_MANAGER test:unit"
    lint: "PACKAGE_MANAGER lint"
    type_check: "PACKAGE_MANAGER type-check"

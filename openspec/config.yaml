schema: spec-driven

# ============================================================
# Project Context
# ============================================================
# This context is shown to AI when creating artifacts.
# It defines the tech stack, conventions, and domain knowledge.

context: |
  ## Project Overview

  **Niuma (牛马)** - Enterprise-grade multi-agent AI assistant system built with TypeScript + Node.js. Supports creating multiple fully independent AI roles, each with isolated configuration, workspace, session, memory, and logs.

  ## Tech Stack

  - **Language**: TypeScript 5.9+
  - **Runtime**: Node.js >=22.0.0
  - **Package Manager**: pnpm
  - **Test Framework**: vitest
  - **LLM Framework**: langchain
  - **Database**: @sqliteai/sqlite-wasm + sqlite-vec

  ### Main Dependencies
  - langchain - AI/LLM application framework
  - @langchain/openai - OpenAI integration
  - zod - Runtime type validation
  - json5 - JSON5 configuration file format
  - @sqliteai/sqlite-wasm - SQLite WASM database
  - cac - Command-line argument parser
  - pino - Logging

  ### Dev Dependencies
  - tsx - TypeScript executor
  - vitest - Unit testing framework
  - eslint - Code style checking

  ## Architecture

  ```
  niuma/
  ├── niuma/
  │   ├── agent/          # Agent core module
  │   ├── bus/            # Event bus
  │   ├── channels/       # Multi-channel integration
  │   ├── cli/            # CLI entry point
  │   ├── config/         # Configuration management
  │   ├── cron/           # Scheduled tasks
  │   ├── heartbeat/      # Active wake-up
  │   ├── providers/      # LLM providers
  │   ├── session/        # Session management
  │   ├── types/          # Type definitions
  │   └── utils/          # Utility functions
  ├── openspec/           # OpenSpec specification
  ├── .iflow/             # iFlow CLI configuration
  └── docs/               # Documentation
  ```

  ### Core Modules
  - **Agent** - Agent core, handles conversation loop, memory management, skill invocation, tool execution
  - **Tools** - Tool collection including file system, shell commands, web requests, MCP protocol, etc.
  - **Bus** - Event bus for async inter-module communication
  - **Channels** - Multi-channel integration (Telegram, Discord, Feishu, DingTalk, Slack, etc.)
  - **Providers** - LLM provider abstraction layer (OpenAI, Anthropic, custom endpoints)
  - **Session** - Session management, history and state persistence
  - **Skills** - Extensible skill system, dynamic SKILL.md loading
  - **Cron** - Scheduled task service
  - **Memory** - Two-layer memory system, automatic long-term memory consolidation

  ## Coding Conventions

  - ES Module syntax (no CommonJS)
  - Strict TypeScript enabled
  - Async/await over Promise chains
  - Prefer composition over inheritance
  - Tools follow nanobot's Tool abstract class pattern
  - Use ESLint for code style checking
  - **Comments must be in Chinese**, code identifiers in English
  - **Diagrams must use mermaid syntax**
  - **OpenSpec specs main content must be in Chinese**

  ## Commit Style

  Conventional Commits:
  - `feat:` new features
  - `fix:` bug fixes
  - `refactor:` code restructuring
  - `docs:` documentation
  - `test:` test changes
  - `chore:` maintenance

  ## Version Management

  - Update `package.json` and `CHANGELOG.md` when changing version
  - Follow Semantic Versioning (semver) specification

  ## Branch Strategy

  - `main` - main branch
  - `feat/*` - feature branches

  ## Build & Test Commands

  ```bash
  pnpm install       # Install dependencies
  pnpm dev           # Development mode
  pnpm build         # Build
  pnpm start         # Run
  pnpm test          # Test
  pnpm lint          # Code check
  pnpm type-check    # Type check
  ```

  ## Key Patterns (from nanobot)

  1. **Tool System**: Abstract base class + Registry pattern
  2. **Provider Registry**: Two-step registration (spec + config field)
  3. **Memory System**: Two-layer (MEMORY.md + HISTORY.md)
  4. **Agent Loop**: LLM call ↔ Tool execution cycle

  ## TDD Roles

  OpenSpec development supports TDD workflow with two key roles:

  ### spec-writer
  - **Responsibility**: Define feature specs and test specs before implementation
  - **Output**: `specs/<capability>/spec.md` + `specs/<capability>/test.md`
  - **When**: After proposal creation, before implementation

  ### tester
  - **Responsibility**: Implement test cases based on test.md, ensure tests fail before implementation
  - **Output**: `tests/**/*.test.ts`
  - **When**: After specs completion, before implementation

  ### TDD Directory Structure
  ```
  openspec/changes/<change-name>/
  ├── proposal.md          # Proposal
  ├── design.md            # Design
  ├── specs/               # Specs (TDD)
  │   └── <capability>/
  │       ├── spec.md      # Feature spec
  │       └── test.md      # Test spec
  └── tasks.md             # Tasks (Red → Green → Refactor)
  ```

  ---

  **Note**: For detailed behavior guidelines and workflow constraints, please refer to AGENTS.md.

# ============================================================
# Per-Artifact Rules
# ============================================================

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include a "Non-goals" section
    - Define clear acceptance criteria
    - Reference existing nanobot code when applicable

  specs:
    - Define inputs, outputs, and edge cases
    - Include TypeScript interface definitions
    - List dependencies on other specs
    - "[TDD] spec-writer must create test.md for each capability"
    - "[TDD] test.md must include normal, boundary, and error test cases"
    - "[TDD] test.md must define acceptance criteria and coverage target"

  design:
    - Include ASCII architecture diagrams
    - Explain key design decisions
    - List trade-offs considered
    - Reference nanobot source files as examples

  tasks:
    - Break tasks into 30-minute chunks
    - Each task should be independently verifiable
    - Number tasks for clear ordering
    - Mark dependencies between tasks
    - "[TDD] Organize tasks in Red → Green → Refactor phases"
    - "[TDD] Test tasks must precede implementation tasks"
    - "[TDD] Each implementation task must have corresponding test verification"

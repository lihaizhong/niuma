schema: spec-driven

# ============================================================
# Project Context
# ============================================================

context: |
  ## Project Overview

  **Niuma (牛马)** - Enterprise-grade multi-agent AI assistant system built with TypeScript.

  ## Tech Stack

  - **Language**: TypeScript 5.9+
  - **Runtime**: Node.js >=22.0.0
  - **Package Manager**: pnpm
  - **Test Framework**: vitest
  - **Web Framework**: Next.js 15
  - **UI**: React 19 + Tailwind CSS

  ## Architecture

  ```
  project-root/
  ├── niuma/                  # Agent 核心实现
  │   ├── core/              # 核心模块
  │   │   ├── agent.ts       # Agent 基类
  │   │   ├── tool.ts        # Tool 基类
  │   │   ├── memory.ts      # 记忆管理
  │   │   └── types.ts       # 类型定义
  │   ├── tools/             # 工具实现
  │   ├── agents/            # Agent 定义
  │   ├── skills/            # Skill 定义
  │   ├── memory/            # 记忆存储实现
  │   └── tests/             # 单元测试
  ├── src/                   # Next.js Web 服务
  │   ├── app/               # App Router
  │   │   ├── api/           # API 路由
  │   │   ├── page.tsx       # 首页
  │   │   └── layout.tsx     # 根布局
  │   ├── components/        # React 组件
  │   ├── lib/               # 工具函数
  │   └── tests/             # 集成测试
  ├── openspec/              # OpenSpec 变更管理
  │   ├── config.yaml        # 配置文件
  │   └── changes/           # 变更记录
  ├── docs/                  # 文档
  ├── .opencode/             # AI 助手配置
  │   └── skills/            # 自定义 skills
  └── .github/               # CI/CD 配置
      └── workflows/
  ```

  ## Development Workflow

  1. **OpenSpec**: Use spec-driven development
  2. **TDD**: Write tests before implementation
  3. **Lint**: ESLint + Prettier for code quality
  4. **Test**: Unit tests + Integration tests
  5. **Docs**: Auto-generate API docs
  6. **CI/CD**: GitHub Actions

  ## Coding Conventions

  - ES Module syntax
  - Strict TypeScript
  - Async/await
  - ESLint for code style
  - **Identifiers in English**, comments can be Chinese

  ## Build & Test Commands

  ```bash
  pnpm install           # Install dependencies
  pnpm dev               # Start web dev server
  pnpm dev:agent         # Start agent dev mode
  pnpm build             # Build all
  pnpm build:agent       # Build agent only
  pnpm build:web         # Build web only
  pnpm test              # Run all tests
  pnpm test:unit         # Run unit tests
  pnpm test:integration  # Run integration tests
  pnpm lint              # Lint code
  pnpm type-check        # Type check all
  pnpm type-check:agent  # Type check agent
  pnpm type-check:web    # Type check web
  ```

# ============================================================
# Per-Artifact Rules
# ============================================================

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include a "Non-goals" section
    - Define clear acceptance criteria

  specs:
    - Must include `## Purpose` and `## Requirements` sections
    - Requirements MUST use 'SHALL' or 'MUST' keyword
    - Each requirement MUST have at least one scenario

  design:
    - Include ASCII architecture diagrams
    - Explain key design decisions
    - List trade-offs considered

  tasks:
    - Break tasks into 30-minute chunks
    - Each task should be independently verifiable
    - Organize tasks in Red → Green → Refactor phases

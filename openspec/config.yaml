# OpenSpec Configuration for Niuma Project
# Schema resolution order: project > user > package

# Default schema for new changes
schema: spec-driven

# Available schemas in this project
schemas:
  spec-driven:
    path: openspec/schemas/spec-driven
    description: Standard spec-driven development with TDD
  bugfix:
    path: openspec/schemas/bugfix
    description: Streamlined bug fix workflow
  spike:
    path: openspec/schemas/spike
    description: Technical research and investigation

context:
  project:
    name: Niuma
    description: Multi-agent AI assistant system
    language: TypeScript
    runtime: Node.js >=22.0.0
    package_manager: pnpm

  tech_stack:
    language: TypeScript 5.9+
    test_framework: vitest
    web_framework: Next.js 15
    ui: React 19 + Tailwind CSS
    runtime: Node.js >=22.0.0

  modules:
    niuma-engine:
      purpose: Agent core implementation
      scope: Agent base classes, tools, memory, types
      tests: src/niuma-engine/tests/
    src:
      purpose: Next.js web service
      scope: Web UI, API routes, components
      tests: src/tests/
    openspec:
      purpose: Change management
      scope: Workflow config, active changes, archived changes
    .opencode:
      purpose: AI assistant configuration
      scope: Commands, skills, plugins

  conventions:
    - ES Module syntax
    - Strict TypeScript
    - Async/await
    - Identifiers in English
    - Comments can be Chinese

  commands:
    install: pnpm install
    dev: pnpm dev
    dev_agent: pnpm dev:agent
    build: pnpm build
    test: pnpm test
    test_unit: pnpm test:unit
    test_integration: pnpm test:integration
    lint: pnpm lint
    type_check: pnpm type-check

schema: spec-driven

context:
  project:
    name: Niuma
    description: Multi-agent AI assistant system
    language: TypeScript
    runtime: Node.js >=22.0.0
    package_manager: pnpm

  tech_stack:
    language: TypeScript 5.9+
    test_framework: vitest
    web_framework: Next.js 15
    ui: React 19 + Tailwind CSS
    runtime: Node.js >=22.0.0

  modules:
    niuma:
      purpose: Agent core implementation
      scope: Agent base classes, tools, memory, types
      tests: niuma/tests/
    src:
      purpose: Next.js web service
      scope: Web UI, API routes, components
      tests: src/tests/
    openspec:
      purpose: Change management
      scope: Workflow config, active changes, archived changes
    .opencode:
      purpose: AI assistant configuration
      scope: Commands, skills, plugins

  conventions:
    - ES Module syntax
    - Strict TypeScript
    - Async/await
    - Identifiers in English
    - Comments can be Chinese

  commands:
    install: pnpm install
    dev: pnpm dev
    dev_agent: pnpm dev:agent
    build: pnpm build
    test: pnpm test
    test_unit: pnpm test:unit
    test_integration: pnpm test:integration
    lint: pnpm lint
    type_check: pnpm type-check

workflow:
  name: spec-driven-development
  phases:
    - id: explore
      name: Explore
      trigger: manual
      command: /opsx-explore

    - id: propose
      name: Propose
      trigger: manual
      command: /opsx-propose
      produces: [proposal.md, design.md, specs/, tasks.md]
      internal_commands:
        - openspec new change <name>
        - openspec status --change <name>
        - openspec instructions <artifact> --change <name>

    - id: apply
      name: Apply
      trigger: manual
      command: /opsx-apply
      gates: [test:unit, lint, type-check]

    - id: validate
      name: Validate
      trigger: pre-commit
      blocking: true
      gates: [openspec validate, test:all, type-check, lint, format-check]
      internal_commands:
        - openspec validate --change <name>
        - openspec validate --all

    - id: archive
      name: Archive
      trigger: post-merge
      branch: main
      action: auto-archive-with-sync
      internal_commands:
        - openspec archive <name>
        - openspec list --specs

rules:
  proposal:
    max_words: 500
    required_sections: [Non-goals, Acceptance Criteria]

  specs:
    required_sections: [Purpose, Requirements]
    keywords: [SHALL, MUST]
    scenarios: required

  design:
    diagrams: ASCII
    content: [design decisions, trade-offs]

  tasks:
    chunk_size: 30min
    verifiable: true
    organization: [Red, Green, Refactor]

# TDD Integration
# See AGENTS.md for high-level workflow

tdd:
  mapping:
    spec_to_test: "<module>/tests/<feature>.test.ts"
    test_to_impl: "<module>/<feature>.ts"

  spec_format:
    required_sections: [Purpose, Requirements, Scenarios]
    keywords: [SHALL, MUST]
    scenario_structure: [WHEN, THEN]

  tasks_structure:
    red_phase:
      prefix: "1."
      action: "Write test for"
      verifiable_by: "test fails"
    green_phase:
      prefix: "2."
      action: "Implement to pass"
      verifiable_by: "test passes"
    refactor_phase:
      prefix: "3."
      action: "Optimize"
      verifiable_by: "tests still pass, code improved"
